name: Prepare sample binaries

on:
  workflow_call:

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:

    # Lego
    - name: Restore original binaries
      id: cache-lego
      uses: actions/cache@v3
      with:
        path: |
          CONFIG.EXE
          ISLE.EXE
          LEGO1.DLL
        key: legobin2

    - name: Download original island binaries
      if: ${{ !steps.cache-lego.outputs.cache-hit }}
      run: |
        wget https://legoisland.org/download/CONFIG.EXE
        wget https://legoisland.org/download/ISLE.EXE
        wget https://legoisland.org/download/LEGO1.DLL

    - name: Verify files
      run: |
        echo "864766d024d78330fed5e1f6efb2faf815f1b1c3405713a9718059dc9a54e52c CONFIG.EXE" | sha256sum --check
        echo "5cf57c284973fce9d14f5677a2e4435fd989c5e938970764d00c8932ed5128ca ISLE.EXE" | sha256sum --check
        echo "14645225bbe81212e9bc1919cd8a692b81b8622abb6561280d99b0fc4151ce17 LEGO1.DLL" | sha256sum --check

    # Ski
    - name: Restore original binaries
      id: cache-ski
      uses: actions/cache@v3
      with:
        path: |
          SKI.EXE
        key: skibin2

    - name: Download original ski binaries
      if: ${{ !steps.cache-ski.outputs.cache-hit }}
      run: |
        wget https://archive.org/download/win3_SKIFREE/SKIFREE.ZIP
        unzip -d skifree SKIFREE.ZIP

    - name: Verify files
      run: |
        echo "0b97b99fcf34af5f5d624080417c79c7d36ae11351a7870ce6e0a476f03515c2 SKI.EXE" | sha256sum --check

    # Merge
    - name: Merge binfile cache
      uses: actions/cache@v3
      with:
        enableCrossOsArchive: true
        path: |
          *.exe
          *.dll
        key: binfiles-${{ hashFiles('*.exe', '*.dll') }}
        restore-keys: binfiles
